name: moneypot
services:
  app:
    container_name: nextjs-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Maps port 3001 on your Mac to port 3000 inside the container
      - "3001:3000"
    environment:
      - NODE_ENV=production
    restart: always
    # The CMD in the Dockerfile handles the startup now